name: Deploy to Oracle k3s

on:
  workflow_run:
    workflows: ["Create and publish Docker images with specific build args"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout k8s-manifests
        uses: actions/checkout@v4
        with:
          repository: iitns/k8s-manifests
          token: ${{ secrets.MANIFESTS_PAT }}

      - name: Update image tag in deployment-external.yaml
        run: |
          SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          sed -i "s|image: ghcr.io/iitns/open-webui:.*|image: ghcr.io/iitns/open-webui:git-${SHORT_SHA}|" \
            apps/oracle-open-webui/deployment-external.yaml
          echo "Updated image to git-${SHORT_SHA}"

      - name: Commit and push
        run: |
          SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/oracle-open-webui/deployment-external.yaml
          git diff --staged --quiet || git commit -m "deploy: open-webui-external git-${SHORT_SHA}"
          git push
